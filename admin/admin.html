<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - Pay Task BD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family:sans-serif;
      background:#111;
      color:white;
      text-align:center;
    }

    .box{
      margin:15px;
      padding:15px;
      background:#222;
      border-radius:10px;
    }

    input, button{
      padding:10px;
      margin:5px;
      border-radius:6px;
      border:none;
    }

    button{
      background:#00ffcc;
      font-weight:bold;
    }
  </style>
</head>

<body>

<h2>🧑‍💼 ADMIN PANEL</h2>

<div class="box">

  <h3>📢 Notice Update</h3>
  <input id="notice" placeholder="Write notice">
  <button onclick="updateNotice()">Update</button>

</div>

<div class="box">

  <h3>💰 Reward Settings</h3>
  <input id="reward" placeholder="Reward points">
  <input id="vip" placeholder="VIP multiplier">
  <button onclick="updateConfig()">Save</button>

</div>

<script>

// UPDATE NOTICE
function updateNotice(){
  fetch("/api/admin/config",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      notice:document.getElementById("notice").value
    })
  }).then(()=>alert("Notice Updated"));
}

// UPDATE CONFIG
function updateConfig(){
  fetch("/api/admin/config",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      reward:document.getElementById("reward").value,
      vipMultiplier:document.getElementById("vip").value
    })
  }).then(()=>alert("Config Updated"));
}

</script>

</body>
</html>

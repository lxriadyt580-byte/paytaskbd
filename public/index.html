<!DOCTYPE html>
<html>
<head>
  <title>Pay Task BD Cash</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      background:#0f0f0f;
      color:white;
      font-family:sans-serif;
      text-align:center;
    }

    .box{
      margin:15px;
      padding:15px;
      background:#1e1e1e;
      border-radius:12px;
    }

    button{
      padding:12px 18px;
      margin:8px;
      border:none;
      border-radius:8px;
      background:#00ffcc;
      font-weight:bold;
      cursor:pointer;
    }

    #notice{
      background:orange;
      color:black;
      padding:10px;
      font-weight:bold;
    }

    #points{
      font-size:22px;
      margin-top:10px;
    }
  </style>
</head>

<body>

<h2>💸 Pay Task BD Cash 💸</h2>

<div id="notice">Loading notice...</div>

<div class="box">
  <h3 id="points">0 PTC</h3>

  <button onclick="rewardedAd()">🎯 Rewarded Ad</button>
  <button onclick="popupAd()">🔥 Popup Ad</button>
</div>

<div id="banner"></div>

<!-- ================= MONETAG SDK ================= -->
<script src='//libtl.com/sdk.js' data-zone='11060514' data-sdk='show_11060514'></script>

<script>
let user = {id:1, name:"test user"};

// ================= CONFIG =================
fetch("/api/config")
.then(res => res.json())
.then(cfg => {
  document.getElementById("notice").innerText = "📢 " + cfg.notice;

  if(cfg.monetagScript){
    document.getElementById("banner").innerHTML = cfg.monetagScript;
  }
});

// ================= LOGIN =================
fetch("/api/login", {
  method: "POST",
  headers: {"Content-Type":"application/json"},
  body: JSON.stringify(user)
});

// ================= EARN SYSTEM =================
function earn(){
  fetch("/api/earn", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({id:user.id})
  })
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("points").innerText =
    d.points + " PTC";
  });
}

// ================= ADS =================

// 🎯 Rewarded Interstitial Ad
function rewardedAd(){
  show_11060514().then(() => {
    alert("✅ Ad Completed!");
    earn();
  });
}

// 🔥 Rewarded Popup Ad
function popupAd(){
  show_11060514('pop')
  .then(() => {
    earn();
  })
  .catch(e => {
    console.log("Ad error");
  });
}

// 📱 Auto In-App Interstitial Ads
show_11060514({
  type: 'inApp',
  inAppSettings: {
    frequency: 2,
    capping: 0.1,
    interval: 30,
    timeout: 5,
    everyPage: false
  }
});
</script>

</body>
</html>

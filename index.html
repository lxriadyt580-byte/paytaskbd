<!DOCTYPE html>
<html>
<head>
  <title>Pay Task BD Cash</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      background:#111;
      color:white;
      font-family:sans-serif;
      text-align:center;
    }

    .box{
      margin:20px;
      padding:20px;
      background:#222;
      border-radius:10px;
    }

    button{
      padding:10px 20px;
      margin:10px;
      border:none;
      border-radius:8px;
      background:#00ffcc;
      font-weight:bold;
    }

    #notice{
      background:orange;
      padding:10px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<h2>💸 Pay Task BD Cash 💸</h2>

<div id="notice">Loading notice...</div>

<div class="box">
  <h3 id="points">0 PTC</h3>

  <button onclick="rewardAd()">🎯 Rewarded Ad</button>
  <button onclick="popupAd()">🔥 Popup Ad</button>
</div>

<div id="bannerAd"></div>

<!-- ================= MONETAG SDK ================= -->
<script src='//libtl.com/sdk.js' data-zone='11060514' data-sdk='show_11060514'></script>

<script>
const tg = window.Telegram?.WebApp;
let user = tg?.initDataUnsafe?.user || {id:1, first_name:"Test"};

// ================= CONFIG LOAD =================
fetch("/api/config")
.then(r=>r.json())
.then(cfg=>{
  document.getElementById("notice").innerText = "📢 " + cfg.notice;

  // optional banner ad inject (if needed)
  document.getElementById("bannerAd").innerHTML = cfg.monetagScript;
});

// ================= LOGIN =================
fetch("/api/login", {
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
    id:user.id,
    name:user.first_name
  })
});

// ================= EARN API =================
function earn(){
  fetch("/api/earn", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({id:user.id})
  })
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("points").innerText =
    d.points + " PTC";
  });
}

// ================= MONETAG ADS =================

// 1️⃣ Rewarded Interstitial
function rewardAd(){
  show_11060514().then(() => {
    alert("You have seen an ad!");
    earn(); // reward after ad
  });
}

// 2️⃣ Rewarded Popup
function popupAd(){
  show_11060514('pop').then(() => {
    earn();
  }).catch(e => {
    console.log("Ad error");
  });
}

// 3️⃣ In-App Interstitial (auto ads)
show_11060514({
  type: 'inApp',
  inAppSettings: {
    frequency: 2,
    capping: 0.1,
    interval: 30,
    timeout: 5,
    everyPage: false
  }
});
</script>

</body>
</html>
